name: Build sukiSU Kernel

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to download source from'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
            echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download source from release
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ASSET_NAME="DBY-W09_HarmonyOS4.0.0_opensource.tar.gz"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET_NAME}"
          echo "从 Release 下载: $DOWNLOAD_URL"
          curl -L -o ${ASSET_NAME} ${DOWNLOAD_URL}
          ls -lh ${ASSET_NAME}

      - name: Extract source code
        run: |
          tar -xzf DBY-W09_HarmonyOS4.0.0_opensource.tar.gz
          echo "解压完成"
          ls -la Code_Opensource/

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libncurses-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            python3 device-tree-compiler lz4 cpio kmod rsync libelf-dev \
            clang lld llvm

      - name: Patch kernel source for GitHub Actions
        working-directory: Code_Opensource/kernel
        run: |
          # Makefile 第412行无条件覆盖CC为gcc-wrapper.py，需要注释掉
          sed -i 's/^CC\t\t= $(PYTHON) $(srctree)\/scripts\/gcc-wrapper.py/# CC is overridden via command line/' Makefile
          echo "已修补 Makefile: 注释掉 gcc-wrapper.py 对 CC 的覆盖"

      - name: Verify toolchain
        run: |
          echo "=== clang ==="
          clang --version
          echo "=== GCC aarch64 ==="
          aarch64-linux-gnu-gcc --version

      - name: Configure kernel
        working-directory: Code_Opensource/kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          CC: clang
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          READELF: llvm-readelf
        run: |
          echo "正在配置内核..."
          make merge_kona_defconfig
          echo "配置完成"

      - name: Build kernel image
        working-directory: Code_Opensource/kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          CC: clang
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          READELF: llvm-readelf
        run: |
          echo "正在编译内核 Image.gz-dtb..."
          make -j$(nproc) Image.gz-dtb 2>&1 | tail -80
          echo "内核镜像编译完成"
          ls -lh arch/arm64/boot/Image.gz-dtb

      - name: Build kernel modules
        working-directory: Code_Opensource/kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          CC: clang
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          READELF: llvm-readelf
        run: |
          echo "正在编译内核模块..."
          make -j$(nproc) modules 2>&1 | tail -50
          echo "模块编译完成"

      - name: Install modules
        working-directory: Code_Opensource/kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          CC: clang
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          READELF: llvm-readelf
        run: |
          mkdir -p /tmp/modules
          make INSTALL_MOD_PATH=/tmp/modules modules_install
          echo "模块安装完成"
          ls -la /tmp/modules/lib/modules/

      - name: Prepare and compress output
        run: |
          mkdir -p output
          cp Code_Opensource/kernel/arch/arm64/boot/Image.gz-dtb output/
          cp -r /tmp/modules/lib/modules/ output/
          if [ -d "Code_Opensource/kernel/arch/arm64/boot/dts" ]; then
            mkdir -p output/dtb
            find Code_Opensource/kernel/arch/arm64/boot/dts -name "*.dtb" -exec cp {} output/dtb/ \; 2>/dev/null || true
          fi
          echo "输出内容:"
          ls -lhR output/
          cd output
          tar -czf ../sukiSU-kernel-DBY-W09.tar.gz .
          cd ..
          ls -lh sukiSU-kernel-DBY-W09.tar.gz

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sukiSU-kernel-DBY-W09
          path: sukiSU-kernel-DBY-W09.tar.gz
          retention-days: 30
