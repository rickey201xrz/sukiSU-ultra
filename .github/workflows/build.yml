name: Build sukiSU Kernel

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to download source from
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
            echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download source from release
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ASSET_NAME="DBY-W09_HarmonyOS4.0.0_opensource.tar.gz"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET_NAME}"
          curl -L -o ${ASSET_NAME} ${DOWNLOAD_URL}
          ls -lh ${ASSET_NAME}

      - name: Extract source code
        run: tar -xzf DBY-W09_HarmonyOS4.0.0_opensource.tar.gz

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi python3 device-tree-compiler lz4 cpio kmod rsync libelf-dev clang lld llvm

      - name: Patch kernel for standalone build
        working-directory: Code_Opensource/kernel
        run: |
          # 禁用gcc-wrapper.py对CC的覆盖（用sed匹配实际的tab字符）
          sed -i '/^CC.*gcc-wrapper\.py/d' Makefile
          # 禁用lcd_kit依赖（华为私有工具链）
          sed -i '/^lcd_kit: FORCE/,/^$/c\lcd_kit: FORCE\n\t@true' Makefile
          # 禁用新版clang不兼容的-Werror
          sed -i 's/-Werror=strict-prototypes/-Wno-error=strict-prototypes/g' Makefile
          sed -i 's/-Werror=implicit-int/-Wno-error=implicit-int/g' Makefile
          sed -i 's/-Werror=date-time/-Wno-error=date-time/g' Makefile
          sed -i 's/-Werror=incompatible-pointer-types/-Wno-error=incompatible-pointer-types/g' Makefile
          sed -i 's/-Werror=designated-init/-Wno-error=designated-init/g' Makefile
          # 禁用fs/hmdfs中的-Werror
          sed -i 's/-Werror/-Wno-error/g' fs/hmdfs/Makefile 2>/dev/null || true
          # 为sched子目录添加include路径（fair.c内联hw_eas/eas_hw.c需要）
          sed -i '1i ccflags-y += -I$(srctree)/kernel/sched' kernel/sched/Makefile
          # 创建缺失的华为私有头文件存根
          mkdir -p include/include
          printf '#ifndef _RTG_SCHED_H\n#define _RTG_SCHED_H\n#endif\n' > include/include/rtg_sched.h
          printf '#ifndef _FRAME_H\n#define _FRAME_H\n#endif\n' > include/include/frame.h
          printf '#ifndef _HW_RSCAN_UTILS_H\n#define _HW_RSCAN_UTILS_H\n#endif\n' > security/hw_root_scan/include/hw_rscan_utils.h
          # 创建缺失的version.h
          printf '#ifndef _LINUX_VERSION_H\n#define _LINUX_VERSION_H\n#define KERNEL_VERSION(a,b,c) (((a) << 16) + ((b) << 8) + (c))\n#endif\n' > include/linux/version.h
          echo "Patch done"

      - name: Configure kernel
        working-directory: Code_Opensource/kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf merge_kona_defconfig
          # 用scripts/config正确禁用缺少依赖的华为私有模块
          scripts/config --disable HW_AI_SCHED
          scripts/config --disable HW_RTG
          scripts/config --disable HW_ROOT_SCAN
          scripts/config --disable HMDFS_FS
          scripts/config --disable HMDFS_ANDROID
          scripts/config --disable HMDFS_1_0
          scripts/config --disable HMDFS_CRYPTO
          scripts/config --disable HW_F2FS_FS
          scripts/config --disable HW_RT_CAS
          scripts/config --disable HW_RT_ACTIVE_LB
          scripts/config --disable HW_SCHED_PRED_LOAD
          scripts/config --disable HW_SCHED_PRED_LOAD_WINDOW_SIZE_TUNNABLE
          scripts/config --disable HW_EAS_SYSFS
          scripts/config --disable HW_BOOST
          scripts/config --disable HW_VIP_THREAD
          scripts/config --disable HW_VIP_SEMAPHORE
          scripts/config --disable CONFIG_SCHED_PERF_CTRL
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf olddefconfig
          echo "Configure done"

      - name: Build kernel image
        working-directory: Code_Opensource/kernel
        run: |
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf KCFLAGS="-Wno-error -include linux/version.h" Image.gz-dtb
          ls -lh arch/arm64/boot/Image*

      - name: Build kernel modules
        working-directory: Code_Opensource/kernel
        run:           make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf KCFLAGS="-Wno-error -include linux/version.h" modules

      - name: Install modules
        working-directory: Code_Opensource/kernel
        run: |
          mkdir -p /tmp/modules
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf INSTALL_MOD_PATH=/tmp/modules modules_install

      - name: Package output
        run: |
          mkdir -p output
          cp Code_Opensource/kernel/arch/arm64/boot/Image.gz-dtb output/
          cp -r /tmp/modules/lib/modules/ output/
          find Code_Opensource/kernel/arch/arm64/boot/dts -name "*.dtb" -exec cp {} output/ \; 2>/dev/null || true
          tar -czf sukiSU-kernel-DBY-W09.tar.gz -C output .
          ls -lh sukiSU-kernel-DBY-W09.tar.gz

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sukiSU-kernel-DBY-W09
          path: sukiSU-kernel-DBY-W09.tar.gz
          retention-days: 30
